[package]
name = "hallouminate"
version = "0.2.1"
edition = "2024"
rust-version = "1.91"
description = "A markdown corpus indexer for LLMs to build and query their own per-repo wikis."
license = "MIT"
readme = "README.md"
repository = "https://github.com/paulnsorensen/hallouminate"
authors = ["Paul Sorensen <paulnsorensen@gmail.com>"]

[dependencies]
clap = { version = "4", features = ["derive"] }

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "process", "net", "sync", "io-util", "signal"] }
tokio-util = "0.7"

# Filesystem watching (corpus auto-reindex)
notify = "8"
notify-debouncer-full = "0.7"

# Storage
lancedb = "0.30"
# Only the `arrow` umbrella: its `arrow::array` / `arrow::datatypes` re-exports
# replace direct arrow-array/arrow-schema deps, so they can never drift apart.
arrow = "58"
async-trait = "0.1"
futures = "0.3"

# Embeddings
fastembed = "5"

# Force vendored (compile-from-source) OpenSSL so `openssl-sys` cross-compiles for
# aarch64-unknown-linux-gnu in the dist release build. openssl-sys is pulled in
# transitively via native-tls (ort-sys/ureq, fastembed/hf-hub, lancedb/reqwest);
# vendoring avoids needing the target's system libssl under cargo-zigbuild cross-compile.
openssl = { version = "0.10", features = ["vendored"] }

# Hashing + filesystem
blake3 = "1"
# `cap-std` is the cross-platform `Dir`-relative API the corpus sandbox uses
# (built on rustix on unix, windows-sys on Windows). Confines all writes to
# the corpus root capability and is the symlink-safe replacement for the
# rustix `openat`/`mkdirat`/`unlinkat`/etc. surface in `sandbox.rs`.
cap-std = "4"
# rustix is still pulled in transitively by cap-std; the direct dep is kept
# for `process::kill_process` (daemon shutdown tests) and `fs::flock`
# (single-instance daemon lock in `server.rs`).
rustix = { version = "1", features = ["fs", "process"] }
ignore = "0.4"
globset = "0.4"

# Markdown + text
pulldown-cmark = { version = "0.13", default-features = false }
stop-words = "0.10"
unicode-segmentation = "1"
text-splitter = { version = "0.31", features = ["markdown", "tokenizers"] }
# Kept in lockstep with text-splitter's `tokenizers` requirement (now ^0.23):
# text-splitter's `ChunkSizer for Tokenizer` impl targets a specific tokenizers
# major, so this direct dep MUST match text-splitter or the `ChunkSizer` impl no
# longer applies to our `Tokenizer`. fastembed pins its own tokenizers 0.22
# internally, so the lock carries both — benign, since those types never cross.
tokenizers = { version = "0.23", features = ["http"] }

# Serialization + config
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1.1"
# Page-level frontmatter parsing via serde_yaml_ng, the maintained fork of the
# archived serde_yaml. lindera 3.x already pulls serde_yaml_ng into the build
# graph, so this direct dep adds zero new compilation and keeps a single YAML
# crate in the tree.
serde_yaml_ng = "0.10"

# Error handling
thiserror = "2"
anyhow = "1"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tracing-appender = "0.2"

# Path resolution
directories = "6"
shellexpand = "3"
url = "2"

# Time + lazy init
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1"
rmcp = { version = "1.7", features = ["server", "macros", "transport-io", "schemars"] }
schemars = "1"

[dev-dependencies]
tempfile = "3"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
