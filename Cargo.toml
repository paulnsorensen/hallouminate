[package]
name = "hallouminate"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "A markdown corpus indexer for LLMs to build and query their own per-repo wikis."
license = "MIT"
readme = "README.md"
repository = "https://github.com/paulnsorensen/hallouminate"
authors = ["Paul Sorensen <paulnsorensen@gmail.com>"]

[dependencies]
clap = { version = "4", features = ["derive"] }

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "process", "net", "sync", "io-util", "signal"] }
tokio-util = "0.7"

# Filesystem watching (corpus auto-reindex)
notify = "8"
notify-debouncer-full = "0.7"

# Storage
lancedb = "0.29"
arrow = "57"
arrow-array = "57"
arrow-schema = "57"
async-trait = "0.1"
futures = "0.3"

# Embeddings
fastembed = "5"

# Hashing + filesystem
blake3 = "1"
libc = "0.2"
ignore = "0.4"
globset = "0.4"

# Markdown + text
pulldown-cmark = { version = "0.13", default-features = false }
stop-words = "0.10"
unicode-segmentation = "1"
text-splitter = { version = "0.30", features = ["markdown", "tokenizers"] }
tokenizers = { version = "0.22", features = ["http"] }

# Serialization + config
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Error handling
thiserror = "2"
anyhow = "1"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tracing-appender = "0.2"

# Path resolution
directories = "5"
shellexpand = "3"

# Time + lazy init
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1"
rmcp = { version = "1.7", features = ["server", "macros", "transport-io", "schemars"] }
schemars = "1"

[dev-dependencies]
tempfile = "3"
