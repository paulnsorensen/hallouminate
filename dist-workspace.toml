[workspace]
members = ["cargo:crates/hallouminate"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# release.yml is dist-generated, but its actions are hand-pinned to commit SHAs
# (OpenSSF Scorecard Pinned-Dependencies). allow-dirty stops `dist plan` from
# failing on that divergence; Dependabot keeps the pinned SHAs current.
allow-dirty = ["ci"]
# Wires .github/workflows/publish-npm.yml as a custom publish job (resolves
# "./publish-npm" -> publish-npm.yml). The release.yml call site is hand-
# maintained since allow-dirty = ["ci"] above stops dist from regenerating it.
publish-jobs = ["./publish-npm"]
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
# x86_64-apple-darwin dropped: ort (ONNX Runtime, via fastembed) ships no prebuilt
# for it (pykeio/ort#556); it can't link without a from-source build (out of scope).
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu"]

# Pin the runners so the ort/onnxruntime prebuilt links cleanly:
#  - x86_64 Linux on ubuntu-24.04 (glibc 2.39) resolves the prebuilt's glibc-2.38
#    C23 symbols (__isoc23_*). cargo-dist's default ubuntu-22.04 (glibc 2.35) is too old.
#  - aarch64 Linux on a NATIVE arm runner (ubuntu-24.04-arm) instead of cross-compiling
#    from x86_64 via zigbuild, which fails to link onnxruntime's C++ runtime
#    (libstdc++ std::* undefined symbols). A native build links it automatically.
[dist.github-custom-runners]
# global: the orchestration jobs (plan/host/global-artifacts/announce) that don't
# link onnxruntime. Kept on ubuntu-24.04 so they match the build runners and the
# rest of CI instead of lagging on dist's default ubuntu-22.04.
global = "ubuntu-24.04"
x86_64-unknown-linux-gnu = "ubuntu-24.04"
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"

# System build dependencies. lance-encoding (via lancedb) runs a build script
# that needs protoc; install it on each release runner like ci.yml does.
[dist.dependencies.apt]
protobuf-compiler = "*"

[dist.dependencies.homebrew]
protobuf = "*"
