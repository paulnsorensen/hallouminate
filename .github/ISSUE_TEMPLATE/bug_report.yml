name: Bug report
description: Something is broken or behaves incorrectly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the fields
        below — the more concrete the repro, the faster the fix.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, copy-pasteable steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `<tool> --version` or the commit SHA.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: OS / runtime
      description: e.g. macOS 14.5, Ubuntu 24.04, Node 20.11
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant log output. Will be auto-formatted as code.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am running the latest released version
          required: false
