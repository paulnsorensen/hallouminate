# Keyless Layer-2 smoke test: install the real harness CLIs (no secrets) and run
# each one's native validate/install against the shipped plugin manifests. The
# structural Layer-1 checks (JSON parse, version == Cargo.toml, path existence,
# marketplace resolution) already run in `cargo test` via
# crates/hallouminate/tests/it/plugin_manifests.rs — this workflow deliberately
# does not duplicate them. Its value is exercising the actual CLIs, which catches
# a manifest that is structurally valid yet rejected by the harness's installer.
#
# Claude Code and Codex install paths are verified keyless and green in CI.
# Gemini CLI was dropped: `gemini extensions install --consent` hung in Actions
# (no non-interactive keyless path), so it stays Layer-1-only alongside Cursor and
# Copilot — all three are covered by the plugin_manifests.rs cargo tests.
name: plugins-smoketest

on:
  push:
    branches: [main]
    paths:
      - "plugins/hallouminate/**"
      - ".claude-plugin/**"
      - ".cursor-plugin/**"
      - ".agents/plugins/**"
      - "Cargo.toml"
      - ".github/workflows/plugins-smoketest.yml"
  pull_request:
    paths:
      - "plugins/hallouminate/**"
      - ".claude-plugin/**"
      - ".cursor-plugin/**"
      - ".agents/plugins/**"
      - "Cargo.toml"
      - ".github/workflows/plugins-smoketest.yml"

permissions:
  contents: read

jobs:
  smoketest:
    name: plugins smoketest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Claude Code — validate --strict
        run: |
          set -euo pipefail
          npm i -g @anthropic-ai/claude-code
          claude plugin validate plugins/hallouminate --strict

      - name: Codex — marketplace add + plugin add
        run: |
          set -euo pipefail
          npm i -g @openai/codex
          export CODEX_HOME="${RUNNER_TEMP}/codex-home"
          mkdir -p "$CODEX_HOME"
          # Source must be the repo root: it carries .agents/plugins/marketplace.json,
          # the file codex reads. A bare `plugins/hallouminate` is parsed as
          # owner/repo and triggers a git clone. Use the absolute workspace path.
          codex plugin marketplace add "$GITHUB_WORKSPACE"
          out="$(codex plugin add hallouminate@hallouminate --json)"
          echo "$out"
          want="$(sed -nE 's/^version = "([^"]+)".*/\1/p' Cargo.toml | head -n1)"
          echo "$out" | jq -e --arg v "$want" '.version == $v' > /dev/null
