name: Publish to npm

# Fires AFTER cargo-dist's release.yml has finished and the GitHub Release
# (with platform-specific tarballs) is live. The npm postinstall script
# downloads those tarballs by URL, so this workflow must run last.
#
# Auth: npm trusted publishing (OIDC). No NPM_TOKEN secret — the job requests
# an id-token and npm mints a short-lived credential, attaching provenance
# automatically. Configure the trusted publisher once at
# npmjs.com -> package `hallouminate` -> Settings -> Trusted Publisher:
# GitHub Actions, repo paulnsorensen/hallouminate, workflow publish-npm.yml.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify versions match release tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          # Strip optional leading "v" — cargo-dist accepts both forms.
          TAG_VER="${TAG#v}"
          CARGO_VER=$(awk '/^\[package\]/{f=1} f&&/^\[/&&!/^\[package\]/{f=0} f&&/^version[[:space:]]*=/{print; exit}' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          NPM_VER=$(jq -r .version npm/package.json)
          echo "Tag: $TAG_VER  Cargo: $CARGO_VER  npm: $NPM_VER"
          if [ "$CARGO_VER" != "$TAG_VER" ]; then
            echo "::error::Cargo.toml version ($CARGO_VER) does not match tag ($TAG_VER)"
            exit 1
          fi
          if [ "$NPM_VER" != "$TAG_VER" ]; then
            echo "::error::npm/package.json version ($NPM_VER) does not match tag ($TAG_VER)"
            exit 1
          fi

  publish-npm:
    needs: version-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing — no NPM_TOKEN secret needed
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24 # bundled npm (>= 11.5.1) satisfies OIDC trusted publishing
      # No registry-url / NODE_AUTH_TOKEN: a set token blocks the OIDC exchange.
      - run: npm publish ./npm --access public
