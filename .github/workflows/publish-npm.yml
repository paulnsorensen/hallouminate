name: Publish to npm

# Fires AFTER cargo-dist's release.yml has finished and the GitHub Release
# (with platform-specific tarballs) is live. The npm postinstall script
# downloads those tarballs by URL, so this workflow must run last.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Verify versions match release tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          # Strip optional leading "v" — cargo-dist accepts both forms.
          TAG_VER="${TAG#v}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          NPM_VER=$(jq -r .version npm/package.json)
          echo "Tag: $TAG_VER  Cargo: $CARGO_VER  npm: $NPM_VER"
          if [ "$CARGO_VER" != "$TAG_VER" ]; then
            echo "::error::Cargo.toml version ($CARGO_VER) does not match tag ($TAG_VER)"
            exit 1
          fi
          if [ "$NPM_VER" != "$TAG_VER" ]; then
            echo "::error::npm/package.json version ($NPM_VER) does not match tag ($TAG_VER)"
            exit 1
          fi

  publish-npm:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm publish ./npm --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
