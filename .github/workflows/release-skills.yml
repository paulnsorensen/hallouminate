# Releases the hallouminate skill pack (the Claude Code plugin under plugins/).
#
# There is no `gh skill publish` / `claude plugin publish` command today —
# Claude Code plugins are distributed by hosting a `.claude-plugin/marketplace.json`
# in a git repo (users run `/plugin marketplace add paulnsorensen/hallouminate`
# then `/plugin install hallouminate@hallouminate`). This job complements that by
# validating the manifests and publishing a versioned, self-contained archive of
# the marketplace + plugin to a GitHub Release, so a specific skill-pack version
# can be pinned, downloaded, and added from a local path.
#
# Triggers: a crate release tag push (`v*` — the same tag that fires the
# cargo-dist release.yml and publish-crates.yml, so the skill pack ships in
# lockstep with the crate; versions are coupled by tests/plugin_manifests.rs)
# or manual `workflow_dispatch`. The release tag is `skills-v<version>`, read
# from plugins/hallouminate/.claude-plugin/plugin.json. We deliberately do
# NOT trigger on a `skills-v*` tag push: the cargo-dist release.yml and
# publish-crates.yml both fire on the greedy `**[0-9]+.[0-9]+.[0-9]+*` tag glob,
# which a `skills-v0.1.0` tag would also match. Creating the tag here via the
# GITHUB_TOKEN-backed `gh release create` avoids that — token-created tags don't
# start new workflow runs. Re-running on a tag whose `skills-v` release already
# exists refreshes its assets instead of double-publishing.
#
# Pull requests touching the pack run the validate + package steps (no release)
# so breakage is caught in review.
#
# To list the pack publicly, submit it once at https://claude.ai/settings/plugins/submit
name: release-skills

on:
  push:
    tags:
      # Anchored at `v`, so `skills-v*` tags do not re-trigger this workflow.
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate and package the skill pack but do not create a GitHub Release"
        type: boolean
        default: false
  pull_request:
    paths:
      - "plugins/**"
      - ".claude-plugin/**"
      - ".github/workflows/release-skills.yml"

permissions:
  contents: write # create the GitHub Release + tag

jobs:
  release-skills:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLUGIN_DIR: plugins/hallouminate
      MARKETPLACE: .claude-plugin/marketplace.json
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate marketplace + plugin manifests
        run: |
          set -euo pipefail
          jq empty "$MARKETPLACE"
          jq empty "$PLUGIN_DIR/.claude-plugin/plugin.json"
          jq empty "$PLUGIN_DIR/.codex-plugin/plugin.json"
          jq empty "$PLUGIN_DIR/.mcp.json"
          jq empty .agents/plugins/marketplace.json
          # the marketplace must reference the plugin by name
          jq -e '.plugins[] | select(.name == "hallouminate")' "$MARKETPLACE" > /dev/null
          # the plugin manifest must carry a name and version
          jq -e '.name == "hallouminate"' "$PLUGIN_DIR/.claude-plugin/plugin.json" > /dev/null

      - name: Validate skill frontmatter
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' skill; do
            echo "checking $skill"
            if [ "$(head -n1 "$skill")" != "---" ]; then
              echo "::error file=$skill::SKILL.md must open with a --- frontmatter block"
              fail=1
              continue
            fi
            front="$(awk 'NR>1 { if ($0 == "---") exit; print }' "$skill")"
            printf '%s\n' "$front" | grep -qE '^description:' \
              || { echo "::error file=$skill::frontmatter is missing a description:"; fail=1; }
          done < <(find "$PLUGIN_DIR/skills" -name SKILL.md -print0)
          exit $fail

      - name: Read pack version
        id: ver
        run: |
          set -euo pipefail
          v="$(jq -r '.version' "$PLUGIN_DIR/.claude-plugin/plugin.json")"
          if [ -z "$v" ] || [ "$v" = "null" ]; then
            echo "::error::plugin.json is missing a version"
            exit 1
          fi
          # On a crate tag push, the pack version must match the tag — the
          # coupling tests/plugin_manifests.rs enforces in CI.
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ "$GITHUB_REF_NAME" != "v$v" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match plugin.json version $v"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=skills-v$v" >> "$GITHUB_OUTPUT"

      - name: Package skill pack
        id: pack
        run: |
          set -euo pipefail
          name="hallouminate-skills-${{ steps.ver.outputs.version }}"
          root="$(mktemp -d)"
          dest="$root/$name"
          # Mirror the repo layout so the archive is a drop-in marketplace:
          #   <name>/.claude-plugin/marketplace.json
          #   <name>/plugins/hallouminate/...
          mkdir -p "$dest/.claude-plugin" "$dest/plugins"
          cp "$MARKETPLACE" "$dest/.claude-plugin/"
          cp -r "$PLUGIN_DIR" "$dest/plugins/"
          ( cd "$root" && zip -rq "$GITHUB_WORKSPACE/$name.zip" "$name" )
          ( cd "$root" && tar -czf "$GITHUB_WORKSPACE/$name.tar.gz" "$name" )
          sha256sum "$name.zip" "$name.tar.gz" > "$name.sha256"
          echo "zip=$name.zip" >> "$GITHUB_OUTPUT"
          echo "tar=$name.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha=$name.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hallouminate-skills-${{ steps.ver.outputs.version }}
          path: |
            ${{ steps.pack.outputs.zip }}
            ${{ steps.pack.outputs.tar }}
            ${{ steps.pack.outputs.sha }}

      - name: Create GitHub Release
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) || github.event_name == 'push' }}
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          notes="hallouminate skill pack ${{ steps.ver.outputs.version }}.

          Install via the in-repo marketplace:
          \`/plugin marketplace add paulnsorensen/hallouminate\` then
          \`/plugin install hallouminate@hallouminate\`, and run \`/hallouminate:install\`.

          Or add this pinned archive from a local path after extracting it:
          \`/plugin marketplace add ./hallouminate-skills-${{ steps.ver.outputs.version }}\`."
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — refreshing assets"
            gh release upload "$tag" \
              "${{ steps.pack.outputs.zip }}" \
              "${{ steps.pack.outputs.tar }}" \
              "${{ steps.pack.outputs.sha }}" --clobber
            # Keep the skills-v tag pointing at the refreshed content. Raw `git push`
            # is unavailable (persist-credentials: false above), so move the ref via
            # the GITHUB_TOKEN-backed API — which also does not retrigger the tag-glob
            # workflows (token ref updates start no runs), matching this file's design.
            gh api --method PATCH "repos/${{ github.repository }}/git/refs/tags/$tag" \
              -f sha="$GITHUB_SHA" -F force=true
          else
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "Skills $tag" \
              --notes "$notes" \
              "${{ steps.pack.outputs.zip }}" \
              "${{ steps.pack.outputs.tar }}" \
              "${{ steps.pack.outputs.sha }}"
          fi
