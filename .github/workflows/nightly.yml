name: Nightly (main)

# Rolling experimental channel: every push to main native-builds the three
# supported targets, refreshes the `nightly` GitHub prerelease, and publishes
# the npm wrapper `@paulnsorensen/hallouminate-nightly` so
# `npx @paulnsorensen/hallouminate-nightly` runs the latest main. The
# tag-triggered official release (release.yml + publish-npm.yml) is untouched.
#
# npm auth is trusted publishing (OIDC) — no NPM_TOKEN. Configure once at
# npmjs.com -> @paulnsorensen/hallouminate-nightly -> Settings ->
# Trusted Publisher: GitHub Actions, repo paulnsorensen/hallouminate,
# workflow nightly.yml.
#
# Builds are NATIVE on pinned runners (never cross-compiled) to satisfy the
# ort/onnxruntime prebuilt link constraints — identical to dist-workspace.toml:
#   x86_64 linux  -> ubuntu-24.04      (glibc 2.39 resolves the prebuilt's C23 symbols)
#   aarch64 linux -> ubuntu-24.04-arm  (native; cross-linking onnxruntime's C++ rt fails)
#   aarch64 macos -> macos-latest

on:
  push:
    branches: [main]
  workflow_dispatch:

# One nightly run at a time; a newer push cancels an in-flight build.
concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NIGHTLY_TAG: nightly

jobs:
  # Upsert the rolling prerelease first so the matrix jobs only upload assets
  # (the release exists before any build finishes). NEVER delete: GitHub's tag
  # deletion is eventually-consistent, so delete-then-recreate-same-tag races the
  # async GC and can orphan the fresh release into a draft (public
  # releases/download/<tag>/ assets then 404). Instead converge to the desired
  # end-state — move the tag atomically, create-or-heal a published prerelease,
  # and let the build jobs clobber assets by their stable names. Every step is
  # safe to re-run and heals a prior broken (draft/orphaned) state.
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Upsert nightly prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Point the nightly tag at this commit — atomic force-update, no
          # async-delete window. Create the ref if it does not yet exist.
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/${NIGHTLY_TAG}" \
              -f sha="$GITHUB_SHA" -F force=true \
            || gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" \
                 -f ref="refs/tags/${NIGHTLY_TAG}" -f sha="$GITHUB_SHA"
          # Ensure a PUBLISHED prerelease exists. `edit --draft=false` heals a
          # prior orphaned draft; `create` covers first-ever run.
          notes="Rolling build of main @ ${GITHUB_SHA}. Prerelease — not a stable version."
          if gh release view "$NIGHTLY_TAG" >/dev/null 2>&1; then
            gh release edit "$NIGHTLY_TAG" --draft=false --prerelease \
              --target "$GITHUB_SHA" --title "nightly (main)" --notes "$notes"
          else
            gh release create "$NIGHTLY_TAG" --prerelease \
              --target "$GITHUB_SHA" --title "nightly (main)" --notes "$notes"
          fi

  build:
    needs: prepare-release
    permissions:
      contents: write # gh release upload
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free disk space
        if: runner.os == 'Linux'
        # The dependency graph (lancedb/arrow/ort) plus the target cache
        # overflow the hosted image's ~14 GB free space. Drop unused toolchains.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Install protoc
        # cross-platform protoc; lance-encoding (via lancedb) needs it at build.
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        # Installs the channel pinned in rust-toolchain.toml (the crate's MSRV).
        run: rustup show

      - name: Expose Xcode compiler runtime
        if: runner.os == 'macOS'
        # ort/onnxruntime links the Xcode clang runtime; add it to LIBRARY_PATH.
        run: |
          set -euo pipefail
          clang_bin="$(xcrun --toolchain XcodeDefault --find clang)"
          clang_usr="$(dirname "$(dirname "$clang_bin")")"
          runtime_dir="$(find "$clang_usr/lib/clang" -type d -path '*/lib/darwin' | sort | tail -n 1)"
          if [ -z "$runtime_dir" ]; then
            echo "::error::could not find Xcode compiler runtime under $clang_usr/lib/clang"
            exit 1
          fi
          echo "LIBRARY_PATH=$runtime_dir${LIBRARY_PATH:+:$LIBRARY_PATH}" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: nightly-${{ matrix.target }}

      - name: Build
        # Native build (host target == matrix.target on each pinned runner).
        run: cargo build --release --locked

      - name: Package
        shell: bash
        # Match the cargo-dist artifact shape the install shim expects:
        # hallouminate-<target>.tar.xz with a top-level hallouminate-<target>/
        # wrapper dir (install.js extracts with --strip-components=1).
        run: |
          set -euo pipefail
          stage="hallouminate-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/release/hallouminate" "$stage/"
          tar -cJf "${stage}.tar.xz" "$stage"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${stage}.tar.xz" > "${stage}.tar.xz.sha256"
          else
            shasum -a 256 "${stage}.tar.xz" > "${stage}.tar.xz.sha256"
          fi

      - name: Upload asset to nightly release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stage="hallouminate-${{ matrix.target }}"
          gh release upload "$NIGHTLY_TAG" \
            "${stage}.tar.xz" "${stage}.tar.xz.sha256" --clobber

  # Publish + smoke in ONE job definition (no cross-job handoff to race).
  # Every matrix leg derives the same version string from run_number +
  # run_attempt, so the smoke test pins the EXACT version instead of
  # resolving the `latest` dist-tag (which raced npm's read-after-write
  # replication and failed with ETARGET). Only the ubuntu leg publishes.
  # Re-runs never conflict because VERSION embeds run_attempt — each re-run
  # mints a fresh version; the publish guard below is cheap defense only.
  # Both legs then retry the pinned npx install until the registry serves it.
  publish-and-smoke:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing — no NPM_TOKEN secret needed
    env:
      PKG: "@paulnsorensen/hallouminate-nightly"
      VERSION: 0.0.0-experimental.${{ github.run_number }}.${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24 # bundled npm (>= 11.5.1) satisfies OIDC trusted publishing
      # This package IS the nightly channel, so its newest build is `latest`.
      - name: Publish (idempotent)
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./npm-nightly
        run: |
          set -euo pipefail
          # Skip only on a confirmed prior publish; any other npm view error
          # (network, auth) fails loudly instead of falling through to publish.
          if npm view "${PKG}@${VERSION}" version >/dev/null 2>view-err.txt; then
            echo "${PKG}@${VERSION} already published — skipping"
            exit 0
          fi
          if ! grep -q "E404" view-err.txt; then
            echo "npm view failed for a non-404 reason:"
            cat view-err.txt
            exit 1
          fi
          npm pkg set version="$VERSION"
          npm publish --tag latest --access public
      - name: Smoke test pinned nightly version
        shell: bash
        # Stream postinstall output to the foreground so an install failure is
        # visible in the log instead of npm's hidden debug file. prefer-online
        # keeps retries from replaying a cached registry miss. The macOS leg
        # has nothing to wait on except the ubuntu publish; the retry loop IS
        # the synchronization.
        env:
          npm_config_foreground_scripts: "true"
          npm_config_prefer_online: "true"
        run: |
          set -euo pipefail
          for attempt in $(seq 1 10); do
            set +e
            output=$(npx --yes "${PKG}@${VERSION}" --version 2>stderr.txt)
            code=$?
            set -e
            echo "attempt ${attempt}: exit=${code}"
            echo "--- stdout ---"; echo "$output"
            echo "--- stderr ---"; cat stderr.txt || true
            if [ "$code" -eq 0 ] && printf '%s' "$output" | grep -Eq '^hallouminate [0-9]+\.[0-9]+\.[0-9]+'; then
              exit 0
            fi
            sleep 30
          done
          echo "smoke test FAILED after 10 attempts (expected 'hallouminate <semver>' on stdout)"
          exit 1