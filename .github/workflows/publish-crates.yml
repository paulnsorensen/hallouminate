# Publishes the crate to crates.io on a version tag (e.g. v0.1.0).
# Runs alongside release.yml (dist), which builds the GitHub Release binaries.
#
# Auth uses crates.io Trusted Publishing (OIDC) — no stored token. One-time setup:
#   crates.io → hallouminate → Settings → Trusted Publishing → add GitHub publisher
#   repository: paulnsorensen/hallouminate, workflow: publish-crates.yml
# See: https://crates.io/docs/trusted-publishing
name: publish-crates

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read
  id-token: write # required for crates.io OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag version '$tag' does not match Cargo.toml version '$manifest'"
            exit 1
          fi
      # Idempotency guard: crates.io versions are immutable, so re-tagging an
      # already-published version makes `cargo publish` fail "already exists".
      # Skip the publish when the version is already on the sparse index so a
      # re-tag (to re-ship binaries) exits green instead of red.
      - name: Skip if version already on crates.io
        id: published
        run: |
          v="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          if curl -sf --retry 3 --retry-connrefused "https://index.crates.io/ha/ll/hallouminate" | jq -r .vers | grep -Fqx "$v"; then
            echo "::notice::hallouminate $v already published — skipping cargo publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
        id: auth
        if: steps.published.outputs.skip != 'true'
      - name: Install protoc
        # `cargo publish` runs a verify build that compiles lance-encoding,
        # whose build script needs protoc (same dep ci.yml/dist install).
        if: steps.published.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo publish --locked
        if: steps.published.outputs.skip != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
